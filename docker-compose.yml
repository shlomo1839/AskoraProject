services:
  mongo:
    image: mongo:7
    container_name: gforms-mongo
    restart: unless-stopped
    ports:
      # Mapped to 27018 on the host to avoid clashing with a local mongod on 27017.
      # Connect MongoDB Compass to: mongodb://localhost:27018
      - "27018:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: ./backend
    container_name: gforms-backend
    restart: unless-stopped
    environment:
      PORT: "5000"
      MONGODB_URI: mongodb://mongo:27017/askora
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: 7d
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    container_name: gforms-frontend
    restart: unless-stopped
    ports:
      # Open the app at http://localhost:8080
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo-data:
